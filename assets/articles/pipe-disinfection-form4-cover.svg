<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="אישור חיטוי צנרת מים לטופס 4">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15564e"/><stop offset="1" stop-color="#2f8a36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.34"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
    <circle cx="120" cy="420" r="6" opacity="0.18"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <g filter="url(#soft)">
    <!-- pipe body -->
    <rect x="432" y="384" width="336" height="66" rx="16" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="6"/>
    <line x1="432" y1="406" x2="768" y2="406" stroke="#ffffff" stroke-opacity="0.5" stroke-width="4"/>
    <!-- flanges -->
    <rect x="420" y="368" width="20" height="98" rx="6" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="760" y="368" width="20" height="98" rx="6" fill="#ffffff" fill-opacity="0.9"/>
    <!-- valve stub + wheel -->
    <rect x="584" y="320" width="32" height="70" rx="6" fill="#0f2a42" fill-opacity="0.55" stroke="#ffffff" stroke-width="5"/>
    <circle cx="600" cy="300" r="42" fill="none" stroke="#ffffff" stroke-width="7"/>
    <circle cx="600" cy="300" r="11" fill="#ffffff"/>
    <g stroke="#ffffff" stroke-width="7" stroke-linecap="round">
      <line x1="600" y1="266" x2="600" y2="334"/><line x1="566" y1="300" x2="634" y2="300"/>
    </g>
  </g>

  <!-- disinfectant droplets -->
  <g fill="#86db8b" filter="url(#soft)">
    <path d="M690 470c0 12-9 20-20 20s-20-8-20-20c0-11 13-22 20-32 7 10 20 21 20 32Z"/>
    <path d="M742 504c0 9-7 16-16 16s-16-7-16-16c0-9 10-18 16-26 6 8 16 17 16 26Z" fill-opacity="0.8"/>
  </g>

  <!-- approval check badge -->
  <g filter="url(#soft)">
    <circle cx="492" cy="492" r="34" fill="#43af49"/>
    <path d="M477 492l11 11 19-22" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
