<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="תוכנית דיגום מים למוסדות בריאות">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15564e"/><stop offset="1" stop-color="#43af49"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.32"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- hospital building -->
  <g filter="url(#soft)">
    <rect x="452" y="330" width="166" height="170" rx="12" fill="#0f2a42" fill-opacity="0.45" stroke="#ffffff" stroke-width="6"/>
    <!-- cross sign -->
    <rect x="506" y="296" width="58" height="44" rx="9" fill="#43af49"/>
    <g fill="#ffffff"><rect x="531" y="305" width="8" height="26" rx="2"/><rect x="522" y="314" width="26" height="8" rx="2"/></g>
    <!-- windows -->
    <g fill="#ffffff" fill-opacity="0.5">
      <rect x="478" y="368" width="26" height="26" rx="4"/><rect x="522" y="368" width="26" height="26" rx="4"/><rect x="566" y="368" width="26" height="26" rx="4"/>
      <rect x="478" y="410" width="26" height="26" rx="4"/><rect x="522" y="410" width="26" height="26" rx="4"/><rect x="566" y="410" width="26" height="26" rx="4"/>
    </g>
    <rect x="518" y="452" width="34" height="48" rx="4" fill="#ffffff" fill-opacity="0.7"/>
  </g>

  <!-- sampling-plan clipboard -->
  <g filter="url(#soft)">
    <rect x="648" y="328" width="134" height="176" rx="14" fill="#ffffff" fill-opacity="0.95"/>
    <rect x="688" y="316" width="54" height="24" rx="7" fill="#15564e"/>
    <g>
      <circle cx="676" cy="372" r="11" fill="#43af49"/><path d="M671 372l4 4 7-8" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="694" y="366" width="66" height="9" rx="4.5" fill="#15564e" fill-opacity="0.35"/>
      <circle cx="676" cy="410" r="11" fill="#43af49"/><path d="M671 410l4 4 7-8" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="694" y="404" width="66" height="9" rx="4.5" fill="#15564e" fill-opacity="0.35"/>
      <circle cx="676" cy="448" r="11" fill="#43af49"/><path d="M671 448l4 4 7-8" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="694" y="442" width="50" height="9" rx="4.5" fill="#15564e" fill-opacity="0.35"/>
    </g>
  </g>

  <!-- heart + pulse badge -->
  <g filter="url(#soft)">
    <circle cx="600" cy="524" r="34" fill="#e6952a"/>
    <path d="M600 540c-9-7-17-12-17-20a8.5 8.5 0 0 1 17-2 8.5 8.5 0 0 1 17 2c0 8-8 13-17 20Z" fill="#fff" fill-opacity="0.25"/>
    <path d="M583 522h7l4-8 6 14 4-6h9" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
