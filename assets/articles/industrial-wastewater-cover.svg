<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="דיגום שפכים תעשייתיים - כללי תאגיד המים">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d4a1f"/><stop offset="1" stop-color="#2f8a36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.34"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
    <circle cx="120" cy="420" r="6" opacity="0.18"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- factory -->
  <g filter="url(#soft)">
    <!-- chimney + smoke -->
    <rect x="470" y="262" width="34" height="78" rx="5" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="5"/>
    <g fill="#ffffff" opacity="0.45"><circle cx="487" cy="250" r="13"/><circle cx="506" cy="238" r="10"/><circle cx="470" cy="240" r="9"/></g>
    <!-- sawtooth roof body -->
    <path d="M452 470V356l36 -26 0 26 36 -26 0 26 36 -26 0 26 36 -26V470Z" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
    <rect x="478" y="402" width="26" height="26" rx="4" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="552" y="402" width="26" height="26" rx="4" fill="#ffffff" fill-opacity="0.55"/>
    <!-- effluent outfall pipe -->
    <path d="M632 446h44v18h-26" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- sample beaker collecting effluent -->
  <g filter="url(#soft)">
    <path d="M664 480l8 78a16 16 0 0 0 16 14h20a16 16 0 0 0 16 -14l8 -78Z" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="5"/>
    <path d="M669 524l4 34a16 16 0 0 0 16 14h20a16 16 0 0 0 16 -14l4 -34Z" fill="#86db8b" fill-opacity="0.7"/>
    <line x1="664" y1="480" x2="724" y2="480" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- droplet stream -->
  <g fill="#7fd3ea"><circle cx="694" cy="478" r="6"/><circle cx="694" cy="496" r="5"/></g>
</svg>
