<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="נוהל תגובה לזיהום במים ובדיקת PCR מהירה">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a2330"/><stop offset="1" stop-color="#123150"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.26"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.36"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- warning triangle emblem -->
  <g transform="translate(600 344) scale(13) translate(-12 -12)" filter="url(#soft)">
    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" fill="#e6952a" fill-opacity="0.22" stroke="#ffffff" stroke-width="0.7" stroke-linejoin="round"/>
    <path d="M12 9v4" fill="none" stroke="#ffd9a0" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M12 17h.01" fill="none" stroke="#ffd9a0" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- rapid response clock -->
  <g filter="url(#soft)">
    <circle cx="486" cy="486" r="40" fill="#0f2a42" fill-opacity="0.6" stroke="#ffffff" stroke-width="6"/>
    <path d="M486 462v24l16 10" fill="none" stroke="#86db8b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- rapid PCR test tube -->
  <g filter="url(#soft)" transform="rotate(16 712 486)">
    <rect x="694" y="430" width="34" height="104" rx="17" fill="#0f2a42" fill-opacity="0.6" stroke="#ffffff" stroke-width="5"/>
    <path d="M698 486h26v26a13 13 0 0 1 -13 13 13 13 0 0 1 -13 -13Z" fill="#86db8b"/>
    <line x1="690" y1="430" x2="732" y2="430" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
