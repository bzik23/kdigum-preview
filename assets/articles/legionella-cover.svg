<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="חיידק ליגיונלה במערכת מים - זיהוי ובדיקה">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2236"/><stop offset="1" stop-color="#2b6a8f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.36"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <!-- floating droplets -->
  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="985" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
    <circle cx="120" cy="430" r="6" opacity="0.18"/>
  </g>

  <!-- focal glass halo -->
  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- shield (topic emblem) -->
  <g transform="translate(560 350) scale(13) translate(-12 -12)" fill="none" stroke="#ffffff" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
  </g>

  <!-- magnifier revealing bacteria -->
  <g filter="url(#soft)">
    <circle cx="712" cy="468" r="86" fill="#0f2a42" fill-opacity="0.55" stroke="#ffffff" stroke-width="6"/>
    <circle cx="712" cy="468" r="86" fill="#7fd3ea" fill-opacity="0.14"/>
    <line x1="772" y1="528" x2="828" y2="584" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <!-- rod-shaped bacteria -->
    <g fill="none" stroke="#86db8b" stroke-width="5" stroke-linecap="round">
      <rect x="668" y="438" width="44" height="17" rx="8.5" transform="rotate(-22 690 446)"/>
      <rect x="700" y="478" width="50" height="18" rx="9" transform="rotate(14 725 487)"/>
      <rect x="676" y="492" width="36" height="15" rx="7.5" transform="rotate(-8 694 499)"/>
    </g>
  </g>

  <!-- amber alert dot -->
  <circle cx="600" cy="300" r="15" fill="#e6952a"/>
  <rect x="596.5" y="276" width="7" height="20" rx="3.5" fill="#0e2236"/>
  <circle cx="600" cy="304" r="3.4" fill="#0e2236"/>
</svg>
