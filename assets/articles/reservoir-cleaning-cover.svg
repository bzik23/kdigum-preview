<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="ניקוי וחיטוי מאגר מים">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123150"/><stop offset="1" stop-color="#2b9fc4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.34"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd3ea" stop-opacity="0.85"/><stop offset="1" stop-color="#2b9fc4" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <clipPath id="tankClip"><rect x="492" y="286" width="216" height="188" rx="26"/></clipPath>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
    <circle cx="120" cy="420" r="6" opacity="0.18"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- legs -->
  <g stroke="#ffffff" stroke-width="8" stroke-linecap="round" filter="url(#soft)">
    <line x1="520" y1="470" x2="506" y2="524"/><line x1="680" y1="470" x2="694" y2="524"/>
  </g>
  <!-- tank -->
  <g filter="url(#soft)">
    <rect x="492" y="286" width="216" height="188" rx="26" fill="#0f2a42" fill-opacity="0.4" stroke="#ffffff" stroke-width="6"/>
    <g clip-path="url(#tankClip)">
      <path d="M492 372 q27 -18 54 0 t54 0 t54 0 t54 0 t40 0 V474 H492 Z" fill="url(#water)"/>
    </g>
    <!-- hatch on top -->
    <rect x="556" y="272" width="88" height="20" rx="8" fill="#ffffff" fill-opacity="0.92"/>
  </g>
  <!-- outlet + droplet -->
  <g filter="url(#soft)">
    <rect x="590" y="474" width="20" height="26" rx="5" fill="#ffffff" fill-opacity="0.9"/>
    <path d="M620 532c0 12-9 20-20 20s-20-8-20-20c0-11 13-22 20-32 7 10 20 21 20 32Z" fill="#7fd3ea"/>
  </g>
  <!-- clean sparkles -->
  <g fill="#86db8b">
    <path d="M548 318l6 16 16 6-16 6-6 16-6-16-16-6 16-6Z"/>
    <path d="M650 348l5 13 13 5-13 5-5 13-5-13-13-5 13-5Z" fill="#ffffff" fill-opacity="0.9"/>
  </g>
</svg>
