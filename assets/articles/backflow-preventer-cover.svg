<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="מז&quot;ח - מונע זרימה חוזרת ובדיקה שנתית">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17456e"/><stop offset="1" stop-color="#2b9fc4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.34"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
    <circle cx="120" cy="420" r="6" opacity="0.18"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- backflow preventer assembly -->
  <g filter="url(#soft)">
    <!-- main pipe -->
    <rect x="436" y="372" width="328" height="56" rx="14" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="6"/>
    <!-- two check-valve chambers -->
    <path d="M496 372a44 44 0 0 1 88 0Z" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="6"/>
    <path d="M616 372a44 44 0 0 1 88 0Z" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="6"/>
    <!-- test cocks -->
    <rect x="528" y="312" width="14" height="22" rx="4" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="648" y="312" width="14" height="22" rx="4" fill="#ffffff" fill-opacity="0.9"/>
    <!-- relief drip below -->
    <rect x="592" y="428" width="16" height="22" rx="5" fill="#ffffff" fill-opacity="0.9"/>
    <circle cx="600" cy="470" r="11" fill="#7fd3ea"/>
  </g>

  <!-- forward flow arrow (allowed) -->
  <g stroke="#86db8b" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#soft)">
    <path d="M452 400h84"/><path d="M520 384l20 16-20 16"/>
  </g>

  <!-- back-flow blocked -->
  <g filter="url(#soft)">
    <circle cx="700" cy="488" r="30" fill="none" stroke="#ff7a7a" stroke-width="8"/>
    <line x1="680" y1="468" x2="720" y2="508" stroke="#ff7a7a" stroke-width="8" stroke-linecap="round"/>
    <path d="M690 488h22" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <path d="M700 478l-12 10 12 10" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
