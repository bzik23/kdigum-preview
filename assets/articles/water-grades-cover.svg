<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="בדיקת מי שתייה - רמה א' מול רמה ב'">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c5f86"/><stop offset="1" stop-color="#36b6d8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.34"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
    <circle cx="120" cy="420" r="6" opacity="0.18"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- big water drop emblem -->
  <g transform="translate(486 348) scale(12.5) translate(-12 -12)" fill="none" stroke="#ffffff" stroke-width="0.72" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5S12.5 5.5 12 3c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7Z"/>
  </g>

  <!-- two graduated tubes: level A (high, approved) vs level B (lower) -->
  <g filter="url(#soft)">
    <!-- tube A -->
    <rect x="612" y="266" width="64" height="232" rx="30" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="5"/>
    <path d="M617 348 h54 v118 a25 25 0 0 1 -25 25 h-4 a25 25 0 0 1 -25 -25 Z" fill="#7fd3ea" fill-opacity="0.75"/>
    <g stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round">
      <line x1="640" y1="320" x2="660" y2="320"/><line x1="640" y1="360" x2="660" y2="360"/><line x1="640" y1="400" x2="660" y2="400"/>
    </g>
    <!-- tube B -->
    <rect x="700" y="266" width="64" height="232" rx="30" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="5"/>
    <path d="M705 414 h54 v52 a25 25 0 0 1 -25 25 h-4 a25 25 0 0 1 -25 -25 Z" fill="#7fd3ea" fill-opacity="0.55"/>
    <g stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round">
      <line x1="728" y1="320" x2="748" y2="320"/><line x1="728" y1="360" x2="748" y2="360"/><line x1="728" y1="400" x2="748" y2="400"/>
    </g>
  </g>

  <!-- A / B chips -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">
    <circle cx="644" cy="244" r="20" fill="#43af49"/>
    <text x="644" y="252" font-size="24" fill="#ffffff">A</text>
    <circle cx="732" cy="244" r="20" fill="#ffffff" fill-opacity="0.9"/>
    <text x="732" y="252" font-size="24" fill="#17456e">B</text>
  </g>
</svg>
