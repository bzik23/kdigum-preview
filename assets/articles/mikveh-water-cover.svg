<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="בדיקות מים למקווה ציבורי">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243a78"/><stop offset="1" stop-color="#2b9fc4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.34"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd3ea" stop-opacity="0.85"/><stop offset="1" stop-color="#2b9fc4" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <clipPath id="mvClip"><rect x="456" y="312" width="288" height="196" rx="22"/></clipPath>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- mikveh basin cross-section -->
  <g filter="url(#soft)">
    <rect x="456" y="312" width="288" height="196" rx="22" fill="#0f2a42" fill-opacity="0.42" stroke="#ffffff" stroke-width="6"/>
    <g clip-path="url(#mvClip)">
      <path d="M456 392q24 -16 48 0t48 0t48 0t48 0t48 0t48 0V508H456Z" fill="url(#water)"/>
      <!-- descending steps -->
      <g fill="#ffffff" fill-opacity="0.9">
        <rect x="650" y="356" width="78" height="15" rx="4"/>
        <rect x="626" y="388" width="78" height="15" rx="4"/>
        <rect x="602" y="420" width="78" height="15" rx="4"/>
      </g>
    </g>
  </g>

  <!-- purity droplet falling in -->
  <g filter="url(#soft)">
    <path d="M540 300c0 16-12 27-27 27s-27-11-27-27c0-15 18-30 27-44 9 14 27 29 27 44Z" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M513 280c5 6 8 11 8 14a8 8 0 0 1 -16 0c0-3 3-8 8-14Z" fill="#7fd3ea"/>
  </g>
</svg>
