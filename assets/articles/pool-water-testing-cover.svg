<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="בדיקות מים לבריכת שחייה ציבורית">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f8fb3"/><stop offset="1" stop-color="#5cc763"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.06" cy="1.12" r="0.95">
      <stop offset="0" stop-color="#000000" stop-opacity="0.30"/><stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.3"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <clipPath id="poolClip"><rect x="444" y="372" width="320" height="128" rx="20"/></clipPath>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>
  <rect width="1200" height="720" fill="url(#shade)"/>

  <g fill="#ffffff">
    <circle cx="170" cy="150" r="9" opacity="0.16"/>
    <circle cx="1040" cy="190" r="14" opacity="0.12"/>
    <circle cx="990" cy="560" r="8" opacity="0.16"/>
    <circle cx="250" cy="585" r="12" opacity="0.10"/>
  </g>

  <circle cx="600" cy="360" r="208" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="208" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14"/>

  <!-- sun -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#soft)">
    <circle cx="490" cy="246" r="30" fill="#ffffff" fill-opacity="0.85" stroke="none"/>
    <g stroke="#ffffff" stroke-opacity="0.85">
      <line x1="490" y1="196" x2="490" y2="210"/><line x1="490" y1="282" x2="490" y2="296"/>
      <line x1="440" y1="246" x2="454" y2="246"/><line x1="526" y1="246" x2="540" y2="246"/>
      <line x1="455" y1="211" x2="465" y2="221"/><line x1="515" y1="271" x2="525" y2="281"/>
    </g>
  </g>

  <!-- pool -->
  <g filter="url(#soft)">
    <rect x="444" y="372" width="320" height="128" rx="20" fill="#0f2a42" fill-opacity="0.4" stroke="#ffffff" stroke-width="6"/>
    <g clip-path="url(#poolClip)" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M444 408q26 -16 52 0t52 0t52 0t52 0t52 0t52 0" stroke-opacity="0.85"/>
      <path d="M444 446q26 -16 52 0t52 0t52 0t52 0t52 0t52 0" stroke-opacity="0.6"/>
      <path d="M444 484q26 -16 52 0t52 0t52 0t52 0t52 0t52 0" stroke-opacity="0.4"/>
    </g>
  </g>
  <!-- ladder -->
  <g stroke="#ffffff" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#soft)">
    <path d="M712 352v120"/><path d="M740 352v120"/>
    <line x1="712" y1="386" x2="740" y2="386"/><line x1="712" y1="420" x2="740" y2="420"/><line x1="712" y1="454" x2="740" y2="454"/>
    <path d="M712 352a14 14 0 0 1 28 0"/>
  </g>
  <!-- floating test vial -->
  <g filter="url(#soft)">
    <rect x="556" y="320" width="34" height="96" rx="17" fill="#0f2a42" fill-opacity="0.5" stroke="#ffffff" stroke-width="5" transform="rotate(18 573 368)"/>
    <path d="M560 372h26v24a13 13 0 0 1 -13 13 13 13 0 0 1 -13 -13Z" fill="#86db8b" transform="rotate(18 573 384)"/>
  </g>
</svg>
